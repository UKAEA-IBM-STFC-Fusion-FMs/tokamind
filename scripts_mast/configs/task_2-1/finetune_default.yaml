experiment_base: "scripts_mast/configs/task_2-1/experiment_base.yaml"
embedding_config: "scripts_mast/configs/task_2-1/embeddings_default.yaml"
phase: finetune
run_id: test

collate:
  p_drop_inputs: 0.08
  p_drop_inputs_overrides:
    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.08
  p_drop_actuators_chunks: 0.0

data:
  cache:
    enable: true
    num_workers: 4
  keep_output_native: false

preprocess:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.005

# "Recommendation: for cached mode, use loader.num_workers=0 (or at most 1).
#  Multi-workers rarely help when each item is already precomputed and Python-heavy."

loader:
  batch_size: 100
  num_workers: 0
  shuffle: true
  drop_last: false
  batches_per_epoch:    # REQUIRED when train with cache: enable: false, document in config guide

# How to initialise the model's weights for this run.
#
# - If model_dir is null    → train from scratch.
# - If model_dir is a path  → warm-start from that previous run using overlap loading.
#
#   *Overlap loading* means we only copy parameters whose keys AND shapes match
#   between the checkpoint and the current model; everything else keeps its
#   current initialisation. This allows you to:
#   - add/remove outputs,
#   - add/remove modalities,
#   - change some submodule shapes
#   between pretrain and finetune.
#
# Use model_init (not resume) when you want a NEW run_dir but still reuse weights with:
#   - different masking rates / different pretrain_task.yaml variant,
#   - staged pretraining  without inheriting optimizer state,
#   - switching  batch size / LR schedule while keeping weights.
#
# load_parts controls which large blocks we reuse; typically keep these True.
# (Even when True, only the compatible intersection is loaded via key+shape match.)
#
#   token_encoder:    per-signal projection layers
#   backbone:         transformer trunk
#   modality_heads:   modality-level heads
#   output_adapters:  per-output adapters
model_init:
  model_dir:   # "runs/test_train"           # e.g. "runs/run_id"
  load_parts:
    token_encoder: true
    backbone: true
    modality_heads: true
    output_adapters: true

train:
  # This is run-level behaviour, not per-stage.
  # If true and checkpoints/latest exists in *this* run_dir, we strictly
  # resume that run: model weights + optimizer + scheduler + scaler + RNG +
  # epoch counters. This is different from model_init.model_dir, which is a
  # warm-start from some *other* run.
  resume: false

  early_stop:
    patience: 5
    delta: 0.0

  loss:
    output_weights:
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  scheduler:
    warmup_steps_fraction: 0.02

  stages:
    - name: ft_warm
      epochs: 2   # if resume = true, total number of epochs, not number of new epochs

      scheduler:
        grad_accum_steps: 2

      optimizer:
        lr:
          token_encoder: 5e-4        # null: inherit from backbone
          backbone: 5e-4  # 5e-4
          modality_heads: 2e-3
          output_adapters: 2e-3
        wd:
          token_encoder: 0.05        # null: inherit from backbone
          backbone: 0.05  # 0.05
          modality_heads: 0.05
          output_adapters: 0.05

      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false

    - name: ft_main
      epochs: 0

      scheduler:
        grad_accum_steps: 2

      optimizer:
        lr:
          token_encoder: 5e-4        # null: inherit from backbone
          backbone: 5e-5
          modality_heads: 1e-3
          output_adapters: 1e-3
        wd:
          token_encoder: 0.05        # null: inherit from backbone
          backbone: 0.05
          modality_heads: 0.05
          output_adapters: 0.05

      # model_dir is null, freeze must be all false
      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false
