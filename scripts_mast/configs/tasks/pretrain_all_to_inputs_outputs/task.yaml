# This "task" is implemented via a baseline-style task_config living in
# scripts_mast/configs/pretrain_global/.
#
# This file defines:
#   - the task name (must match the enclosing folder name),
#   - the task_config pointer (baseline task definition),
#   - optional task-wide overrides that should apply to *all* phases
#     (pretrain / finetune / eval / tune_dct3d), e.g. model adapter sizes.

task: pretrain_all_to_inputs_outputs
task_config: scripts_mast/configs/pretrain_global/pretrain_all_to_inputs_outputs.yaml