# Default configuration for FINETUNE phase. (shared across tasks_overrides)
#
# Task-specific changes belong in:
#   scripts_mast/configs/tasks_overrides/<task>/finetune_overrides.yaml
#   (e.g., run_id, model_source.run_dir for warm-start, per-signal collate drops, etc.)
#
# Notes on resume vs warm-start:
# - train.resume=true resumes the SAME run_dir (optimizer/scheduler/scaler/RNG/epochs).
# - model_source.run_dir is a warm-start from a DIFFERENT run (weights only, overlap loading).

seed: 54

runtime:
  debug_logging: false

# Optional: name the training run folder under runs/. If omitted, loader generates one.
run_id: null

data:
  local: true         # True = uses local dataset, False = HPC / remote
  subset_of_shots: null   # None / null → uses all shots

  keep_output_native: false
  cache:
    enable: true
    dtype: float16          # or float32; default behavior if omitted is “no cast”
    num_workers: 32
    max_windows:
      train: null
      val: null

preprocess:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.01  # we override the stride based on different tasks


collate:
  p_drop_inputs: 0.05
  p_drop_inputs_overrides: {}
#    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.05
  p_drop_actuators_chunks: 0.0


# "Recommendation: for cached mode, use loader.num_workers=0 (or at most 1).
#  Multi-workers rarely help when each item is already precomputed and Python-heavy."

loader:
  batch_size: 512
  num_workers: 0
  shuffle_train: true
  drop_last: false

# Model source is now specified via CLI: --model <run_id_or_path>
# The loader will automatically set model_source and inherit the model config.
#
# Which model parts to warm-start (optional override):
model_source:
  load_parts:
    token_encoder: true
    backbone: true
    modality_heads: true
    output_adapters: false

# for finetuning we choose specific output-adapters:
model:
  output_adapters:
    hidden_dim:
      default: 0

      bucketed:
        enable: true
        rules:
          - {max_out_dim: 64,   hidden: 0}
          - {max_out_dim: 512,  hidden: 32}
          - {max_out_dim: 4096, hidden: 64}
          - {max_out_dim: 8192, hidden: 128}
          - {max_out_dim: null, hidden: d_model}   # fallback / otherwise

      manual: {}   # {output_name: hidden_int, ...} (always wins)

train:
  # This is run-level behaviour, not per-stage.
  # If true and checkpoints/latest exists in *this* run_dir, we strictly
  # resume that run: model weights + optimizer + scheduler + scaler + RNG +
  # epoch counters. This is different from model_source.run_dir, which is a
  # warm-start from some *other* run.
  resume: false

  early_stop:
    patience: 10
    delta: 0.0

  amp:
    enable: true

  loss:
    output_weights:
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  stages:
    - name: ft_heads
      epochs: 5

      scheduler:
        grad_accum_steps: 1

      optimizer:
        lr:
          token_encoder: 5e-4
          backbone: 0.0
          modality_heads: 1e-3
          output_adapters: 5e-3
        wd:
          token_encoder: 0.01
          backbone: 0.0
          modality_heads: 0.01
          output_adapters: 0.01

      freeze:
        token_encoder: false
        backbone: true
        modality_heads: false
        output_adapters: false

    - name: ft_full
      # Stage 2: unfreeze backbone with a smaller LR (full finetune)
      epochs: 15

      scheduler:
        grad_accum_steps: 1

      optimizer:
        lr:
          token_encoder: 0.0     # keep frozen (optional)
          backbone: 5e-4
          modality_heads: 1e-3
          output_adapters: 5e-3
        wd:
          token_encoder: 0.0
          backbone: 0.01
          modality_heads: 0.01
          output_adapters: 0.01

      freeze:
        token_encoder: true
        backbone: false
        modality_heads: false
        output_adapters: false
