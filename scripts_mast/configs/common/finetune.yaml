# Default FINETUNE configuration (shared across tasks).
#
# Most task-specific changes belong in:
#   scripts_mast/configs/tasks_overrides/<task>/finetune_overrides.yaml
#
# Quick edit guide:
# - CLI init mode: --init warmstart|scratch (and --model for warmstart)
# - embeddings.mode and embeddings.tune_embeddings.roles
# - train.stages (epochs, lr, wd, freeze)
# - collate drop probabilities
#
# Resume vs warmstart:
# - train.resume=true resumes the same run_dir state (weights, optimizer,
#   scheduler, scaler, RNG, epoch counters).
# - warmstart (--init warmstart --model ...) initializes from another run.

seed: 54

runtime:
  debug_logging: false

# Optional run folder name under runs/. If null, loader generates one.
run_id: null


data:
  local: false  # true = load from local_path (dev/laptop); false = stream from remote HPC store
  local_path:   # used only when local: true
  subset_of_shots: null   # None / null → uses all shots

  keep_output_native: false
  cache:
    enable: true
    dtype: float16
    num_workers: 64
    max_windows:
      train: null
      val: null


preprocess:
  # Both scratch and warmstart use this block.
  # Task-specific finetune_overrides.yaml can override these values.
  chunk:
    chunk_length: 0.005
    stride: null

  trim_chunks:
    max_chunks: 50

  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.005


embeddings:
  mode: source  # source | config
  # source: copy source run embeddings; roles=true re-tunes that role.
  # config: ignore source embeddings and use the selected emb_profile as-is.

  tune_embeddings:
    roles:
      input: false
      actuator: false
      output: true

    guardrails:
      enable: true

    objective:
      thresholds:
        output: 0.999
      max_budget:
        output: null


collate:
  p_drop_inputs: 0.05
  p_drop_inputs_overrides: {}
#    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.05
  p_drop_actuators_chunks: 0.0


# For cached mode, loader.num_workers=0 (or at most 1) is usually best.
loader:
  batch_size: 512
  num_workers: 0
  shuffle_train: true
  drop_last: false
  batches_per_epoch: null  # required only when data.cache.enable=false


train:
  # Run-level behavior (not per-stage).
  resume: false

  early_stop:
    patience: 10
    delta: 0.0

  amp:
    enable: true

  loss:
    output_weights:
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  stages:
    - name: ft_heads
      epochs: 5

      scheduler:
        grad_accum_steps: 1
        warmup_steps_fraction: 0.02

      optimizer:
        lr:
          token_encoder: 5e-4
          backbone: 0.0
          modality_heads: 1e-3
          output_adapters: 5e-3
        wd:
          token_encoder: 0.01
          backbone: 0.0
          modality_heads: 0.01
          output_adapters: 0.01

      freeze:
        token_encoder: false
        backbone: true
        modality_heads: false
        output_adapters: false

    - name: ft_full
      epochs: 15

      scheduler:
        grad_accum_steps: 1
        warmup_steps_fraction: 0.02

      optimizer:
        lr:
          token_encoder: 0.0
          backbone: 5e-4
          modality_heads: 1e-3
          output_adapters: 5e-3
        wd:
          token_encoder: 0.0
          backbone: 0.01
          modality_heads: 0.01
          output_adapters: 0.01

      freeze:
        token_encoder: true
        backbone: false
        modality_heads: false
        output_adapters: false


# -----------------------------
# Advanced model initialization
# -----------------------------

# Warmstart source is provided by CLI: --init warmstart --model <run_id_or_path>.
# Scratch mode ignores model_source and does not load source parts.
model_source:
  load_parts:
    token_encoder: true
    backbone: true
    modality_heads: true
    output_adapters: false

# Scratch: model = deep_merge(model_scratch, finetune_model_overrides)
model_scratch:
  backbone:
    d_model: 192
    n_layers: 4
    n_heads: 6
    dim_ff: 768
    dropout: 0.05
    activation: relu

  modality_heads:
    timeseries:
      hidden: 192
      out_dim: 192
    profile:
      hidden: 192
      out_dim: 192
    video:
      hidden: 192
      out_dim: 192

# Applied in both scratch and warmstart.
finetune_model_overrides:
  output_adapters:
    hidden_dim:
      default: 0

      bucketed:
        enable: true
        rules:
          - {max_out_dim: 64, hidden: 0}
          - {max_out_dim: 512, hidden: 32}
          - {max_out_dim: 4096, hidden: 64}
          - {max_out_dim: 8192, hidden: 128}
          - {max_out_dim: null, hidden: d_model}

      manual: {}  # {output_name: hidden_int, ...} (always wins)

# Warmstart: model = deep_merge(source_model, finetune_model_overrides, warmstart.model_overrides)
warmstart:
  model_overrides: {}
