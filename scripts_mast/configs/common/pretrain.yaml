# Default configuration for PRETRAIN phase. (shared across tasks_overrides)
#
# Task-specific changes belong in:
#   scripts_mast/configs/tasks_overrides/<task>/finetune_overrides.yaml
#   (e.g., run_id, model_source.run_dir for warm-start, per-signal collate drops, etc.)
#
# Notes on resume vs warm-start:
# - train.resume=true resumes the SAME run_dir (optimizer/scheduler/scaler/RNG/epochs).
# - model_source.run_dir is a warm-start from a DIFFERENT run (weights only, overlap loading).


collate:
  p_drop_inputs: 0.1
  p_drop_inputs_overrides: {}
#    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.1
  p_drop_actuators_chunks: 0.0

data:
  cache:
    enable: false
    num_workers: 8
  keep_output_native: false

preprocess:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.005

# "Recommendation: for cached mode, use loader.num_workers=0 (or at most 1).
#  Multi-workers rarely help when each item is already precomputed and Python-heavy."

loader:
  batch_size: 1024
  num_workers: 2
  shuffle_train: true
  drop_last: false
  batches_per_epoch: 100  # Required only when data.cache.enable=false (streaming)

model_source:
  # Optional warm-start source run directory.
  #
  # - run_dir: null  -> train from scratch
  # - run_dir: <path> -> warm-start weights from another run (partial/overlap load)
  #
  # Overlap loading reuses parameters only when (key, shape) match; missing or
  # incompatible parameters are initialized. This is different from resume
  # (resume continues the *same* run_dir with full optimizer/scheduler state).
  #
  # Overlap loading allows to:
  #   - add/remove outputs,
  #   - add/remove modalities,
  #   - change some submodule shapes between pretrain and finetune.
  #
  # See docs/config_guide.md#warmstart for details.
  run_dir: null

  # Which model parts to warm-start. Defaults to True for all parts if omitted.
  load_parts:
    token_encoder: true
    backbone: true
    modality_heads: true
    output_adapters: true


train:
  # This is run-level behaviour, not per-stage.
  # If true and checkpoints/latest exists in *this* run_dir, we strictly
  # resume that run: model weights + optimizer + scheduler + scaler + RNG +
  # epoch counters. This is different from model_source.run_dir, which is a
  # warm-start from some *other* run.
  resume: false

  early_stop:
    patience: 8
    delta: 0.0

  loss:
    output_weights: {}
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  scheduler:
    warmup_steps_fraction: 0.02

  stages:
    - name: pretrain_warm
      epochs: 2   # if resume = true, total number of epochs, not number of new epochs

      scheduler:
        grad_accum_steps: 1

      optimizer:
        lr:
          token_encoder: 3e-4          # null: inherit from backbone
          backbone: 2e-4
          modality_heads: 5e-4
          output_adapters: 5e-4
        wd:
          token_encoder: 0.05          # null: inherit from backbone
          backbone: 0.05
          modality_heads: 0.05
          output_adapters: 0.05

      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false

    - name: pretrain_main
      epochs: 2

      scheduler:
        grad_accum_steps: 1

      optimizer:
        lr:
          token_encoder: 3e-4        # null: inherit from backbone
          backbone: 1e-4
          modality_heads: 3e-4
          output_adapters: 3e-4
        wd:
          token_encoder: 0.05        # null: inherit from backbone
          backbone: 0.05
          modality_heads: 0.05
          output_adapters: 0.05

      # run_dir is null, freeze must be all false
      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false
