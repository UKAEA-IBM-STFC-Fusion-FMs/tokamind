# Default configuration for PRETRAIN phase. (shared across tasks_overrides)
#
# Task-specific changes belong in:
#   scripts_mast/configs/tasks_overrides/<task>/pretrain_overrides.yaml
#   (e.g., per-task preprocess/collate/training knobs)
#
# Notes on resume:
# - train.resume=true resumes the SAME run_dir
#   (optimizer/scheduler/scaler/RNG/epochs).

seed: 54

runtime:
  debug_logging: false

# run_id is now specified via CLI: --run-id (explicit) or --tag (generates {task}_{tag}) or defaults to task name
# See: python run_pretrain.py --help


data:
  local: true   # true = load from local_path (dev/laptop); false = stream from remote HPC store
  local_path: /rds/project/rds-mOlK9qn0PlQ/fairmast/upload-tmp/level2    # used only when local: true
  subset_of_shots: null   # None / null → uses all shots

  keep_output_native: false
  cache:
    enable: true
    dtype: float16          # or float32
    num_workers: 64
    max_windows:
      train: null
      val: null


preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history


  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.005


embeddings:
  tune_embeddings:
    roles:
      input: true
      actuator: true
      output: true
    
    guardrails:
      enable: true


collate:
  p_drop_inputs: 0.1
  p_drop_inputs_overrides: {}
#    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.1
  p_drop_actuators_chunks: 0.0


# "Recommendation: for cached mode, use loader.num_workers=0 (or at most 1).
#  Multi-workers rarely help when each item is already precomputed and Python-heavy."
loader:
  batch_size: 512
  num_workers: 0
  shuffle_train: true
  drop_last: false
  batches_per_epoch: null  # Required only when data.cache.enable=false


model:
  backbone:
    d_model: 192
    n_layers: 4
    n_heads: 6
    dim_ff: 768
    dropout: 0.05
    activation: relu

  modality_heads:
    timeseries:
      hidden: 192
      out_dim: 192
    profile:
      hidden: 192
      out_dim: 192
    video:
      hidden: 192
      out_dim: 192

  output_adapters:
    hidden_dim:
      default: 0
      bucketed:
        enable: false
      manual: {}   # manual always wins
#        equilibrium-psi: 128


train:
  # This is run-level behaviour, not per-stage.
  # If true and checkpoints/latest exists in *this* run_dir, we strictly
  # resume that run: model weights + optimizer + scheduler + scaler + RNG +
  # epoch counters. This is different from model_source.run_dir, which is a
  # warm-start from some *other* run.
  resume: false

  early_stop:
    patience: 10
    delta: 0.0

  amp:
    enable: true

  loss:
    output_weights: {}
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  stages:
    - name: pretrain_main
      epochs: 50

      scheduler:
        grad_accum_steps: 1
        warmup_steps_fraction: 0.02

      optimizer:
        lr:
          token_encoder: 5e-3           # null: inherit from backbone
          backbone: 1e-3
          modality_heads: 5e-3
          output_adapters: 5e-3
        wd:
          token_encoder: 0.01              # null: inherit from backbone
          backbone: 0.01
          modality_heads: 0.01
          output_adapters: 0.01

      # run_dir is null, freeze must be all false
      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false
