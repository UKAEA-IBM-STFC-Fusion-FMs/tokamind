# Default configuration for PRETRAIN phase. (shared across tasks_overrides)
#
# Task-specific changes belong in:
#   scripts_mast/configs/tasks_overrides/<task>/finetune_overrides.yaml
#   (e.g., run_id, model_source.run_dir for warm-start, per-signal collate drops, etc.)
#
# Notes on resume vs warm-start:
# - train.resume=true resumes the SAME run_dir (optimizer/scheduler/scaler/RNG/epochs).
# - model_source.run_dir is a warm-start from a DIFFERENT run (weights only, overlap loading).

seed: 54

runtime:
  debug_logging: false

# Optional: name the training run folder under runs/. If omitted, loader generates one.
run_id: null

data:
  local: true         # True = uses local dataset, False = HPC / remote
  subset_of_shots: null   # None / null → uses all shots;

  keep_output_native: false
  cache:
    enable: true
    dtype: float16          # or float32
    num_workers: 32
    max_windows:
      train: null
      val: null

preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history

  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.01

collate:
  p_drop_inputs: 0.1
  p_drop_inputs_overrides: {}
#    pf_active-solenoid_current: 0.1
  p_drop_outputs: 0.0
  p_drop_outputs_overrides: {}
  p_drop_actuators: 0.0
  p_drop_actuators_overrides: {}
  p_drop_inputs_chunks: 0.1
  p_drop_actuators_chunks: 0.0

# "Recommendation: for cached mode, use loader.num_workers=0 (or at most 1).
#  Multi-workers rarely help when each item is already precomputed and Python-heavy."

loader:
  batch_size: 512
  num_workers: 0
  shuffle_train: true
  drop_last: false
  batches_per_epoch: null  # Required only when data.cache.enable=false (streaming)

model:
  backbone:
    d_model: 256
    n_layers: 6
    n_heads: 8
    dim_ff: 1024
    dropout: 0.05
    activation: relu

  modality_heads:
    timeseries:
      hidden: 256
      out_dim: 256
    profile:
      hidden: 256
      out_dim: 256
    video:
      hidden: 384
      out_dim: 256

  output_adapters:
    hidden_dim:
      default: 0
      bucketed:
        enable: false
      manual: {}   # manual always wins
#        equilibrium-pis: 128

train:
  # This is run-level behaviour, not per-stage.
  # If true and checkpoints/latest exists in *this* run_dir, we strictly
  # resume that run: model weights + optimizer + scheduler + scaler + RNG +
  # epoch counters. This is different from model_source.run_dir, which is a
  # warm-start from some *other* run.
  resume: false

  early_stop:
    patience: 10
    delta: 0.0

  amp:
    enable: true

  loss:
    output_weights: {}
#      summary-ip: 1.2

  optimizer:
    use_adamw: true

  scheduler:
    warmup_steps_fraction: 0.02

  stages:
    - name: pretrain_main
      epochs: 30

      scheduler:
        grad_accum_steps: 1

      optimizer:
        lr:
          token_encoder: 1e-3           # null: inherit from backbone
          backbone: 5e-4
          modality_heads: 1e-3
          output_adapters: 1e-3
        wd:
          token_encoder: 0.01              # null: inherit from backbone
          backbone: 0.01
          modality_heads: 0.01
          output_adapters: 0.01

      # run_dir is null, freeze must be all false
      freeze:
        token_encoder: false
        backbone: false
        modality_heads: false
        output_adapters: false


