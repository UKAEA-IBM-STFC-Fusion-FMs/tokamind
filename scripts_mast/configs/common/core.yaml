# Global defaults shared by *all* phases (pretrain/finetune/eval/tune_dct3d).
# Intentionally does NOT include:
#   - task / task_config (belongs in tasks/<task>/task.yaml)
#   - preprocess.valid_windows (can differ per phase; keep it in phase configs)

seed: 54

data:
  local: false         # True = uses local dataset, False = HPC / remote
  subset_of_shots: 2   # None / null → uses all shots;

preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history

model:
  backbone:
    d_model: 128  # 256
    n_layers: 2   # 4
    n_heads: 2    # 8
    dim_ff: 256   # 1024
    dropout: 0.1
    activation: "relu"

  modality_heads:
    timeseries:
      hidden: 128
      out_dim: 128
    profile:
      hidden: 128
      out_dim: 128
    video:
      hidden: 192
      out_dim: 128

  output_adapters:
    hidden_default: 0
    hidden_overrides: {}   # task-specific overrides go in tasks/<task>/task.yaml
#      equilibrium-psi: 32
