# Global defaults shared by all phases (pretrain / finetune / eval / tune_dct3d).
#
# This file should contain only stable, task-agnostic defaults:
#   - seed and global data defaults
#   - preprocessing steps that must stay consistent across phases
#     (e.g., chunking, trimming)
#   - model architecture defaults (backbone / modality heads / adapter defaults)
#
# Intentionally does NOT include:
#   - preprocess.valid_windows (may differ per phase; defined in common/<phase>.yaml)
#   - run-specific settings (run_id / eval_id / model_source.run_dir)
#
# Config merge order (later wins):
#   1) common/core.yaml
#   2) common/embeddings.yaml
#   3) common/<phase>.yaml
#   4) tasks_overrides/<task>/core_overrides.yaml
#   5) tasks_overrides/<task>/<phase>_overrides.yaml (optional)
#   6) tasks_overrides/<task>/embedding_overrides/<profile>.yaml
#      (used by default for pretrain/finetune/eval, not used during tune_dct3d)



seed: 54

data:
  local: false         # True = uses local dataset, False = HPC / remote
  subset_of_shots: 2   # None / null → uses all shots;

preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history

model:
  backbone:
    d_model: 128  # 256
    n_layers: 2   # 4
    n_heads: 2    # 8
    dim_ff: 256   # 1024
    dropout: 0.1
    activation: "relu"

  modality_heads:
    timeseries:
      hidden: 128
      out_dim: 128
    profile:
      hidden: 128
      out_dim: 128
    video:
      hidden: 192
      out_dim: 128

  output_adapters:
    hidden_default: 0
    hidden_overrides:    # other task-specific overrides go in tasks_overrides/<task>/task.yaml
      equilibrium-psi: 32
