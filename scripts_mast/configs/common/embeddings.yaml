# Default encoder settings per (role, modality).
# Used for all signals of that role+modality unless overridden per-signal below.

# Input and actuators overrides have been computed from tuning embeddings on the pretraining task.
# Output task-specific overrides should live in tasks_overrides/<task>/embedding_overrides/<profile>.yaml.

# encoder_name: "dct3d" or "identity"

embeddings:
  defaults:
    input:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    actuator:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    output:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 10, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 8, keep_w: 8, keep_t: 10 }

  # Input and actuators overrides computed from the pretraining task.
  # Output task-specific overrides should live in tasks_overrides/<task>/embedding_overrides/<profile>.yaml.
  per_signal_overrides:
    input:
      interferometer-n_e_line:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 20
      magnetics-b_field_pol_probe_ccbv_field:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 40
          keep_w: 1
          keep_t: 2
      magnetics-b_field_pol_probe_obr_field:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 18
          keep_w: 1
          keep_t: 2
      magnetics-b_field_pol_probe_obv_field:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 18
          keep_w: 1
          keep_t: 2
      magnetics-b_field_pol_probe_omv_voltage:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 3
          keep_w: 1
          keep_t: 1280
      magnetics-b_field_tor_probe_cc_field:
        encoder_name: dct3d
