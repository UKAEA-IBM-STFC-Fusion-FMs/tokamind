# Shared embeddings configuration.
#
# - defaults: baseline encoder settings by (role, modality)
# - tune_embeddings: DCT3D tuning controls used by pretrain/finetune flows
#
# Task-specific overrides belong in:
#   scripts_mast/configs/tasks_overrides/<task>/embeddings_overrides/<profile>.yaml

embeddings:
  defaults:
    input:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    actuator:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    output:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 10, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 8, keep_w: 8, keep_t: 10 }

  # Runtime-only run-local values. Do not commit tuned run artifacts here.
  per_signal_overrides: {}

  tune_embeddings:
    n_shots: 100
    max_windows: 15000

    objective:
      thresholds:
        input: 0.999
        actuator: 0.999
        output: 0.995
      max_budget:
        input: 4096
        actuator: 4096
        output: 4096

    # Guardrails: ensure minimum dimension coverage in coefficient selection.
    guardrails:
      enable: true
      timeseries:
        min_unique_t: 5
      profile:
        min_unique_h: 10
        min_unique_t: 5
      video:
        min_unique_h: 10
        min_unique_w: 10
        min_unique_t: 5
