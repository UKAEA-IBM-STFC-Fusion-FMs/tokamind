# Default encoder settings per (role, modality).
# Used for all signals of that role+modality unless overridden per-signal below.

# Input and actuators overrides have been computed from tuning embeddings on the pretraining task.
# Output task-specific overrides should live in tasks_overrides/<task>/embedding_overrides/<profile>.yaml.

# encoder_name: "dct3d" or "identity"

embeddings:
  defaults:
    input:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    actuator:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 5, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 16, keep_w: 16, keep_t: 5 }

    output:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 1, keep_w: 1, keep_t: 10 }

      profile:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 10, keep_w: 1, keep_t: 10 }

      video:
        encoder_name: "dct3d"
        encoder_kwargs: { keep_h: 8, keep_w: 8, keep_t: 10 }

  # Input and actuators overrides computed from the pretraining task.
  # Output task-specific overrides should live in tasks_overrides/<task>/embedding_overrides/<profile>.yaml.
  per_signal_overrides: