# Default configuration for EVAL phase.
#
# This file contains eval settings shared across tasks_overrides.
#
# IMPORTANT:
#   - model_source.run_dir must point to the TRAINING run to evaluate.
#   - Do NOT set it here (common config).
#     Set it in: scripts_mast/configs/tasks_overrides/<task>/eval_overrides.yaml
#
# Outputs are saved under:
#   <model_source.run_dir>/<eval_id>/   (or eval__<timestamp> if eval_id is omitted)



model_source:
  run_dir: null   # REQUIRED for eval; set in task eval overrides

# optional; if omitted, loader uses eval__<timestamp>
eval_id: null

data:
  cache:
    enable: true
    num_workers: 4
  keep_output_native: true  # required for metrics/traces


preprocess:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: null  # we evaluate on all the possible windows


loader:
  batch_size: 1024
  num_workers: 1
  drop_last: false
  batches_per_epoch: null   # ignored in evaluation


eval:
  # list of inputs/actuators/outputs you want to drop for evaluation
  # null: evaluate the full model
  drop:
    inputs: null # ["pf_active-coil_current"]
    actuators: null
    outputs: null # ["pf_active-solenoid_current", "summary-ip"]

  metrics:
    enable: true

  traces:
    enable: false
    n_max: 2
    signals: null # ["pf_active-coil_current"]      # null → save all outputs
    times_indexes: # [0, 1]                         # null → save full horizon