# Default configuration for the DCT3D tuning phase - RANK MODE ONLY.
#
# This file defines settings for run_tune_dct3d.py:
#   • preprocess.valid_windows thresholds used to select windows for tuning
#   • tune_dct3d sampling policy and objective thresholds
#
# The tuner uses TuneRankedDCT3DTransform (variance-based coefficient selection).
# No grid search - coefficients are selected by explained variance E[c_i²].
#
# Task-specific overrides can go in:
#   scripts_mast/configs/tasks_overrides/<task>/tune_dct3d_overrides.yaml
#
# Tuned outputs are written to:
#   scripts_mast/configs/tasks_overrides/<task>/embeddings_overrides/dct3d.yaml
#   scripts_mast/configs/tasks_overrides/<task>/embeddings_overrides/dct3d_indices/*.npy

seed: 54

runtime:
  debug_logging: false

data:
  local: true         # True = uses local dataset, False = HPC / remote
  subset_of_shots: 100

preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history

  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.02

tune_dct3d:
  sampling:
    max_windows: 15000

  objective:
    thresholds:
      input: 0.999
      actuator: 0.999
      output: 0.995
    max_budget:
      input: 4096
      actuator: 4096
      output: 4096

  # Guardrails: ensure minimum dimension coverage in coefficient selection
  # Disabled by default (no guardrails for pretraining)
  # Enable in task-specific overrides for finetuning if needed

  # DIMENSION MAPPING (all signals internally use H,W,T representation):
  #   Timeseries (T,)    → (H=1, W=1, T=T)
  #   Profile    (C, T)  → (H=C, W=1, T=T)  [C channels map to H dimension]
  #   Video      (H,W,T) → (H,   W,   T)

  guardrails:
    enabled: false
    timeseries:      # For signals with shape (T,) → (1, 1, T)
      min_unique_t: 5
    profile:         # For signals with shape (C, T) → (C, 1, T)
      min_unique_h: 10  # Minimum unique channel indices (C maps to H)
      min_unique_t: 5
    video:           # For signals with shape (H, W, T)
      min_unique_h: 10
      min_unique_w: 10
      min_unique_t: 5
