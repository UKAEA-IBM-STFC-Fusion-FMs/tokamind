# Default configuration for the DCT3D tuning phase.
#
# This file defines settings shared across tasks_overrides for run_tune_dct3d.py:
#   • preprocess.valid_windows thresholds used to select windows for tuning
#   • tune_dct3d sampling policy, objective thresholds, and search space
#
# Do NOT add task-specific values here. Task-specific changes (e.g. different
# search space, objective thresholds, or tuned parameters output) should go in:
#   scripts_mast/configs/tasks_overrides/<task>/tune_dct3d_overrides.yaml   (optional)
# and tuned encoder parameters should be written to:
#   scripts_mast/configs/tasks_overrides/<task>/dct3d.yaml   (generated)

seed: 54

runtime:
  debug_logging: false

data:
  local: false         # True = uses local dataset, False = HPC / remote
  subset_of_shots: 5

preprocess:
  chunk:
    chunk_length: 0.005          # 5 ms per chunk (placeholder)
    stride: null                 # null => non-overlapping chunks

  trim_chunks:
     max_chunks: 50     # maximum number of chunks in the history

  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.02

tune_dct3d:
  sampling:
    max_windows: 15000

  objective:
    thresholds:
      input: 0.999
      actuator: 0.999
      output: 0.995
    max_budget:
      input: 4096
      actuator: 4096
      output: 4096

  search_space:
    keep_h: [ 1, 4, 8, 16, 32, 64, 96, 128 ]
    keep_w: [ 1, 4, 8, 16, 24, 32, 65 ] # video is 65
    keep_t: [ 1, 2, 4, 8, 16, 32, 64, 96, 128, 192, 224, 256, 512, 768, 1024, 1280, 2048 ]
