# Pretraining task: Maximal denoising autoencoding over the full signal universe.
# Inputs are (ALL benchmark inputs + ALL benchmark outputs) + ALL actuators; targets are ALL inputs + ALL outputs.
# Advantages: trains TokenEncoder ingestion for every signal (including equilibrium-only outputs) and trains all output heads;
# most 'foundation-model' style, but heaviest.
#
# Windowing: instantaneous reconstruction (output window overlaps input window).
# We set input_length=output_length=0.050s and delta=-0.050s, so targets align to the same history window.
# (Edit these three numbers if you want 25ms instead of 50ms, etc.)

#subset_of_shots: null
#local: false
task_name: pretrain_all_to_inputs_outputs

