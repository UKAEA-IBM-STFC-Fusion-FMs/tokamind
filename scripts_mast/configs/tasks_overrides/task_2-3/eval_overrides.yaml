# Task-specific overrides for evaluation.
# Typical uses:
#   - point to the training run to evaluate (model_source.run_dir)
#   - optionally set a human-readable eval_id (otherwise timestamp is used)
#   - tweak metrics/traces settings for this task
#   - tighten/relax preprocess.valid_windows thresholds for eval

model_source:
  # source model directory. It must be in runs/
  run_dir: tuned_2-3_small_v1-2
#  run_dir: trained_2-3_tiny_v0

# If omitted, loader uses eval__<timestamp>.
eval_id: eval

# override to be sure we set the same stride as the task definition
preprocess:
  valid_windows:
    window_stride_sec: null
