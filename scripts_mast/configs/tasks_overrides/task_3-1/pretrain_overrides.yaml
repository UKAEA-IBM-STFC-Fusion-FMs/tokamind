# Task-specific overrides for the PRETRAIN phase.
# Use this file only when a given pretrain task needs settings beyond the
# shared defaults in config/common/pretrain.yaml (e.g. a fixed run_id, different
# LR/epochs, warm-start settings, etc.).

# Optional: name the training run folder under runs/. If omitted, loader generates one.
run_id: trained_3-1_small_v1

preprocess:
  valid_windows:
     window_stride_sec: 0.01

model:
  output_adapters:
    hidden_dim:
      default: 0

      bucketed:
        enable: true
        rules:
          - {max_out_dim: 64,   hidden: 0}
          - {max_out_dim: 512,  hidden: 32}
          - {max_out_dim: 4096, hidden: 64}
          - {max_out_dim: 8192, hidden: 128}
          - {max_out_dim: null, hidden: d_model}   # fallback / otherwise

      manual: {}   # {output_name: hidden_int, ...} (always wins)