# Task-specific overrides for finetuning.
#
# Model source is now specified via CLI:
#   python run_finetune.py --task task_4-5 --model MODEL [--tag TAG]
#
# This file contains only task-specific settings:
#   - task-specific training knobs (epochs, lr, batch_size, etc.)
#   - per-signal collate drop rates or masking policies
#   - preprocess settings specific to this task

preprocess:
  valid_windows:
    window_stride_sec: 0.02
  
  trim_chunks:
    max_chunks: 40

