# Use this file to override parameters from the shared embeddings.yaml
# tune_embeddings: block for this specific task. It is merged at load time
# when --emb_profile dct3d is passed to the entry script.
#
# embeddings.mode (finetune only):
#   source (default) - copy source run embeddings, inherit or retune per role
#   config           - ignore source artifacts; use current config as-is
#                      (set this in vae.yaml or other non-dct3d profiles)
#
# Typical uses:
#   - Re-tune specific roles while inheriting others from the source model
#   - Tighten or relax explained-variance thresholds per role
#   - Change max_budget to control embedding dimensionality
#   - Increase n_shots / max_windows for more thorough tuning
#   - Disable guardrails for signals with unusual DCT profiles
#
# Example - re-tune only output, inherit input/actuator from source model:
#   embeddings:
#     mode: source
#     tune_embeddings:
#       roles:
#         output: true
#
# Example - full re-tune with custom thresholds:
#   embeddings:
#     mode: source
#     tune_embeddings:
#       roles:
#         input: true
#         actuator: true
#         output: true
#       objective:
#         thresholds:
#           output: 0.990
#         max_budget:
#           output: 2048
#
# DO NOT store pre-tuned coeff_indices or per_signal_overrides here.
# Tuned indices are generated at training time and saved to
# runs/<run_id>/embeddings/ alongside model weights.

embeddings:
  tune_embeddings:
    objective:
      thresholds:
        input: 0.999
        actuator: 0.999
        output: 0.999
      max_budget:
        input: 4096
        actuator: 4096
        output: 4096
