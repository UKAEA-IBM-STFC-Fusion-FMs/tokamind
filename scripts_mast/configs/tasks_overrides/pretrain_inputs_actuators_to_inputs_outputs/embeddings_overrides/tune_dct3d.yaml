seed: 54
runtime:
  debug_logging: false
data:
  local: true
  subset_of_shots: null
preprocess:
  chunk:
    chunk_length: 0.005
    stride: null
  trim_chunks:
    max_chunks: 50
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: 0.05
model:
  backbone:
    d_model: 256
    n_layers: 6
    n_heads: 8
    dim_ff: 1024
    dropout: 0.1
    activation: relu
  modality_heads:
    timeseries:
      hidden: 256
      out_dim: 256
    profile:
      hidden: 256
      out_dim: 256
    video:
      hidden: 384
      out_dim: 256
  output_adapters:
    hidden_default: 0
    hidden_overrides:
      equilibrium-psi: 32
embeddings:
  defaults:
    input:
      timeseries:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 10
      profile:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 5
          keep_w: 1
          keep_t: 10
      video:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 16
          keep_w: 16
          keep_t: 5
    actuator:
      timeseries:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 10
      profile:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 5
          keep_w: 1
          keep_t: 10
      video:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 16
          keep_w: 16
          keep_t: 5
    output:
      timeseries:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 10
      profile:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 10
          keep_w: 1
          keep_t: 10
      video:
        encoder_name: dct3d
        encoder_kwargs:
          keep_h: 8
          keep_w: 8
          keep_t: 10
  per_signal_overrides: null
tune_dct3d:
  sampling:
    n_shots: 100
    max_windows: 2000
  objective:
    thresholds:
      input: 0.999
      actuator: 0.999
      output: 0.995
    max_budget:
      input: 4096
      actuator: 4096
      output: 4096
  search_space:
    keep_h:
    - 1
    - 4
    - 8
    - 16
    - 32
    - 64
    - 96
    - 128
    keep_w:
    - 1
    - 4
    - 8
    - 16
    - 32
    - 65
    keep_t:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 96
    - 128
    - 192
    - 224
    - 256
    - 512
    - 768
    - 1024
    - 1280
    - 2048
task: pretrain_inputs_actuators_to_inputs_outputs
phase: tune_dct3d
embeddings_profile: dct3d
paths:
  repo_root: /home/ir-bosc1/git/multi-modal-transformer
  configs_root: /home/ir-bosc1/git/multi-modal-transformer/scripts_mast/configs
  run_dir: /home/ir-bosc1/git/multi-modal-transformer/scripts_mast/configs/tasks_overrides/pretrain_inputs_actuators_to_inputs_outputs
  config_dir: /home/ir-bosc1/git/multi-modal-transformer/scripts_mast/configs/tasks_overrides/pretrain_inputs_actuators_to_inputs_outputs
  tune_dir: /home/ir-bosc1/git/multi-modal-transformer/scripts_mast/configs/tasks_overrides/pretrain_inputs_actuators_to_inputs_outputs/embeddings_overrides
