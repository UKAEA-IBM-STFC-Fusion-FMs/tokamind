# Task-specific overrides for finetuning.
#
# Model source is now specified via CLI:
#   python run_finetune.py --task _test --model MODEL [--tag TAG]
#
# This file contains only task-specific settings:
#   - task-specific training knobs (epochs, lr, batch_size, etc.)
#   - per-signal collate drop rates or masking policies
#   - preprocess settings specific to this task

model_source:
  # Source training run to warm-start from. If omitted/null, train from scratch.
  run_dir: test_pretrain
  model_path: null
  # load_parts: { token_encoder: true, backbone: true, modality_heads: true, output_adapters: true }


# Optional: name the training run folder under runs/. If omitted, loader generates one.

preprocess:
  valid_windows:
     window_stride_sec: 0.005
