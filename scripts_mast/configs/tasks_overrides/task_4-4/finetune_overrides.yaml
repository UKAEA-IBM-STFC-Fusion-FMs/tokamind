# Task-specific overrides for finetuning.
# Typical uses:
#   - warm-start settings (model_source.run_dir + optional load_parts)
#   - task-specific training knobs (epochs, lr, batch_size, etc.)
#   - per-signal collate drop rates or masking policies
#   - per-signal adapter sizes (if you prefer not to keep them in task.yaml)

#model_source:
#  # Source training run to warm-start from. If omitted/null, train from scratch.
#  run_dir: mmt_tiny_v0


# Optional: name the training run folder under runs/. If omitted, loader generates one.
run_id: tuned_4-4_base_v1-2

preprocess:
  valid_windows:
     window_stride_sec: 0.02

loader:
  batch_size: 256    # <- task specific

