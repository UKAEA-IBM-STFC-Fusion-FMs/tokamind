# mmt/configs/task2_1/eval_default.yaml
#
# Evaluation-only config for task 2-1.
# Uses the same experiment + embedding definitions as fine-tuning,
# but no training hyperparameters.

# PLACEHOLDER

experiment_base: "mmt/configs/task_2-1/experiment_base.yaml"
embedding_config: "mmt/configs/task_2-1/embeddings_default.yaml"
phase: "eval"

# Required: which trained run to evaluate
init:
  model_dir: "runs/task_2-1/finetune/2025-12-07_10-42-03_seed-1234"


data:
  keep_output_native: true


preprocessing:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: null


loader:
  batch_size: 24
  num_workers: 4
  shuffle: true
  drop_last: false
  streaming:
    batches_per_epoch: null   # ignored in evaluation

