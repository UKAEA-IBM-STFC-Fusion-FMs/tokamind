experiment_base: "mmt/configs/task_2-1/experiment_base.yaml"
embedding_config: "mmt/configs/task_2-1/embeddings_default.yaml"
phase: "eval"
eval_id:

# Required: which trained run to evaluate
model_init:
  model_dir: "runs/test_trained/"


data:
  cache:
    enable: false
    num_workers: 10
  keep_output_native: true


preprocess:
  valid_windows:
    min_valid_inputs_actuators: 1
    min_valid_outputs: 1
    min_valid_chunks: 1
    window_stride_sec: null


loader:
  batch_size: 1024
  num_workers: 1
  drop_last: false
  streaming:
    batches_per_epoch: null   # ignored in evaluation


eval:
  save_dir: null

  metrics:
    enable: true

  traces:
    enable: false
    n_max: 10
    signals: ["summary-ip"]           # null → save all targets
    times_indexes: [0, 1]                  # null → save full horizon