# mmt/configs/task2_1/embeddings_default.yaml

# Default encoder settings per (role, modality).
# These are used for all signals of that role+modality,
# unless a specific per-signal override is present below.

embeddings:
  defaults:
    input:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 10

      profile:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 5
          keep_w: 1
          keep_t: 10

      video:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 16
          keep_w: 16
          keep_t: 5

    actuator:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 10

      profile:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 5
          keep_w: 1
          keep_t: 10

      video:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 16
          keep_w: 16
          keep_t: 5

    output:
      timeseries:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 1
          keep_w: 1
          keep_t: 5

      profile:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 10
          keep_w: 1
          keep_t: 5

      video:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 8
          keep_w: 8
          keep_t: 5

  # Optional per-signal overrides.
  # Keyed by signal name as defined in the baseline config.

  per_signal_overrides:
    output:
      equilibrium-psi:
        encoder_name: "dct3d"
        encoder_kwargs:
          keep_h: 16
          keep_w: 16
          keep_t: 5
